services:
  kafka:
    image: apache/kafka:latest
    hostname: kafka
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://${KAFKA_ADVERTISED_HOST:-localhost}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ebook-generator-app:latest
    container_name: ebook-service
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      APP_URL: http://app:3000
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      EXPORT_RENDER_SECRET: ${EXPORT_RENDER_SECRET:-dev-export-render-secret}
      VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY:-}
      VITE_POLLINATIONS_API_KEY: ${VITE_POLLINATIONS_API_KEY:-}
    volumes:
      - ebook-exports:/app/exports
    depends_on:
      kafka:
        condition: service_healthy

  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: ebook-generator-worker:latest
    container_name: ebook-kafka-consumer
    restart: unless-stopped
    shm_size: '1gb'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: ebook-generator
      KAFKA_GROUP_ID: ebook-generator-newsletter-consumers-v2
      KAFKA_TOPIC_NEWSLETTER_PDF: NEWS_LETTER_PDF
      KAFKA_TOPIC_NEWSLETTER_PDF_READY: NEWS_LETTER_PDF_READY
      KAFKA_TOPIC_NEWSLETTER_PDF_FAILED: NEWS_LETTER_PDF_FAILED
      KAFKA_BLOG_BATCH_REQUEST_TOPIC: newsletter-delivery
      KAFKA_BLOG_PDF_READY_TOPIC: newsletter-pdf-ready
      APP_URL: http://host.docker.internal:3000
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      EXPORT_RENDER_SECRET: ${EXPORT_RENDER_SECRET:-dev-export-render-secret}
      VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY:-}
      VITE_POLLINATIONS_API_KEY: ${VITE_POLLINATIONS_API_KEY:-}
      KAFKAJS_NO_PARTITIONER_WARNING: 1
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_PDF_FOLDER: ${CLOUDINARY_PDF_FOLDER:-newsletter-pdfs}
    volumes:
      - ebook-exports:/app/exports
    depends_on:
      kafka:
        condition: service_healthy
      app:
        condition: service_started

  kafka-url-producer:
    build:
      context: .
      dockerfile: Dockerfile.kafka
    image: ebook-generator-kafka:latest
    container_name: ebook-kafka-url-producer
    restart: unless-stopped
    command: ["npm", "run", "kafka:url-producer"]
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: ebook-generator
      KAFKA_URL_PRODUCER_GROUP_ID: ebook-generator-url-producers
      KAFKA_TOPIC_NEWSLETTER_PDF_READY: NEWS_LETTER_PDF_READY
      KAFKA_TOPIC_NEWSLETTER_PDF_PUBLIC_URL: NEWS_LETTER_PDF_PUBLIC_URL
      KAFKA_TOPIC_NEWSLETTER_PDF_COMPLETED: NEWS_LETTER_PDF_COMPLETED
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    depends_on:
      kafka:
        condition: service_healthy
      kafka-consumer:
        condition: service_started

  kafka-public-url-consumer:
    image: ebook-generator-kafka:latest
    container_name: ebook-kafka-public-url-consumer
    restart: unless-stopped
    command: ["npm", "run", "kafka:public-url-consumer"]
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: ebook-generator
      KAFKA_PUBLIC_URL_CONSUMER_GROUP_ID: ebook-generator-public-url-consumers
      KAFKA_TOPIC_NEWSLETTER_PDF_PUBLIC_URL: NEWS_LETTER_PDF_PUBLIC_URL
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    depends_on:
      kafka:
        condition: service_healthy
      kafka-url-producer:
        condition: service_started

volumes:
  ebook-exports:
