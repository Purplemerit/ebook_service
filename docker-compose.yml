services:
  kafka:
    image: apache/kafka:latest
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://${KAFKA_ADVERTISED_HOST:-localhost}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ebook-service
    ports:
      - "3000:3000"
    environment:
      APP_URL: http://app:3000
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      EXPORT_RENDER_SECRET: ${EXPORT_RENDER_SECRET:-dev-export-render-secret}
      VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY:-}
      VITE_POLLINATIONS_API_KEY: ${VITE_POLLINATIONS_API_KEY:-}
    volumes:
      - ebook-exports:/app/exports
    depends_on:
      kafka:
        condition: service_healthy

  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ebook-kafka-consumer
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: ebook-generator
      KAFKA_GROUP_ID: ebook-generator-newsletter-consumers
      KAFKA_TOPIC_NEWSLETTER_PDF: NEWS_LETTER_PDF
      KAFKA_TOPIC_NEWSLETTER_PDF_COMPLETED: NEWS_LETTER_PDF_COMPLETED
      KAFKA_TOPIC_NEWSLETTER_PDF_FAILED: NEWS_LETTER_PDF_FAILED
      APP_URL: http://app:3000
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      EXPORT_RENDER_SECRET: ${EXPORT_RENDER_SECRET:-dev-export-render-secret}
      VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY:-}
      VITE_POLLINATIONS_API_KEY: ${VITE_POLLINATIONS_API_KEY:-}
      KAFKAJS_NO_PARTITIONER_WARNING: 1
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_PDF_FOLDER: ${CLOUDINARY_PDF_FOLDER:-newsletter-pdfs}
    volumes:
      - ebook-exports:/app/exports
    depends_on:
      kafka:
        condition: service_healthy
      app:
        condition: service_started

volumes:
  ebook-exports:
